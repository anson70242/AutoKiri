name: Build AutoKiri EXEs

# 触发条件：推送到 main 分支，或者在网页端手动点击运行
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest # 强制使用 Windows 环境，确保生成 .exe 文件

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' # 推荐使用 3.11，兼容性和打包体积较好

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt

    - name: Run PyInstaller (AutoKiri)
      run: |
        echo "Building AutoKiri-Main..."
        python -m PyInstaller --onefile --paths . --clean --name "AutoKiri-Main" main.py
        
        echo "Building AutoKiri-Download..."
        python -m PyInstaller --onefile --paths . --clean --name "AutoKiri-Download" video_chat.py
        
        echo "Building AutoKiri-DownVideo..."
        python -m PyInstaller --onefile --paths . --clean --name "AutoKiri-DownVideo" down_video.py
        
        echo "Building AutoKiri-DownChat..."
        python -m PyInstaller --onefile --paths . --clean --name "AutoKiri-DownChat" down_chat.py
        
        echo "Building AutoKiri-Highlight..."
        python -m PyInstaller --onefile --paths . --clean --name "AutoKiri-Highlight" clip_highlight.py

    - name: Assemble Release Package
      shell: bash
      run: |
        echo "创建整合文件夹..."
        mkdir -p release_package/src/highlight_cliper/prompt
        mkdir -p release_package/videos
        
        echo "整理生成的可执行文件..."
        mv dist/*.exe release_package/
        
        echo "复制必须的配置文件..."
        cp config.yaml release_package/
        cp README.md release_package/
        cp .env.example release_package/
        
        echo "复制 Prompt 模板文件..."
        cp -r src/highlight_cliper/prompt/* release_package/src/highlight_cliper/prompt/

        echo "复制内建的 Tools 工具包..."
        # 👇 直接把整个 tools 资料夹复制进打包目录
        cp -r tools release_package/

    - name: Upload AutoKiri Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: AutoKiri-Full-Release
        path: release_package/